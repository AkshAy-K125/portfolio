<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F6F5F2" media="(prefers-color-scheme: light)" />
    <meta name="description"
      content="Akshay Kumar — Application Engineer at Flipkart. Building data-driven systems, scalable applications, and crafted web experiences." />
    <meta property="og:title" content="Akshay Kumar — Application Engineer" />
    <meta property="og:description" content="Application Engineer at Flipkart. Data engineering, distributed systems, and crafted web experiences." />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="/manifest.json" />
    <title>Akshay Kumar — Application Engineer</title>
    <script>
      // Hydrate theme before paint to avoid FOUC. Dark default — only honour explicit user choice.
      (function () {
        try {
          var t = localStorage.getItem('portfolio-theme');
          var theme = t === 'light' ? 'light' : 'dark';
          document.documentElement.classList.toggle('light', theme === 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
